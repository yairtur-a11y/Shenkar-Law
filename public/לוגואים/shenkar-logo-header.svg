<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="Shenkar & Co. Law Offices">
  <title>Shenkar &amp; Co. Law Offices</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <text
      x="450"
      y="102"
